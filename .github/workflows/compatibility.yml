name: compatibility

on:
  push:
  pull_request:

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        shell: bash
        run: |
          version=8.30.1
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  ${archive}" \
            | sha256sum --check
          tar --extract --gzip --file "$archive" gitleaks
      - name: Scan repository history
        run: ./gitleaks git --redact --no-banner

  boot2-jdk-matrix:
    name: Boot 2 ${{ matrix.boot }} / JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        boot: [2.6.15, 2.7.18]
        java: [8, 11, 17]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify Boot 2 modules and samples
        run: >-
          mvn -B -ntp clean verify
          -pl :log-mask-parent,log-mask-core,log-mask-http-core,log-mask-resttemplate-spring-boot2-autoconfigure,log-mask-resttemplate-spring-boot2-starter,log-mask-samples
          -Dspring-boot2.version=${{ matrix.boot }}
      - name: Verify bytecode and module boundaries
        shell: pwsh
        run: >-
          ./scripts/verify-quality-gates.ps1
          -SpringBoot2Version ${{ matrix.boot }}
          -SpringBoot3Version 3.5.16

  boot3-jdk-matrix:
    name: Boot 3 ${{ matrix.boot }} / JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        boot: [3.2.12, 3.3.13, 3.4.13, 3.5.16]
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify dual-generation reactor
        run: mvn -B -ntp clean verify -Dspring-boot3.version=${{ matrix.boot }}
      - name: Verify bytecode and module boundaries
        shell: pwsh
        run: >-
          ./scripts/verify-quality-gates.ps1
          -SpringBoot2Version 2.7.18
          -SpringBoot3Version ${{ matrix.boot }}
