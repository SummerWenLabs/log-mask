name: compatibility

on:
  push:
  pull_request:

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        shell: bash
        run: |
          version=8.30.1
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  ${archive}" \
            | sha256sum --check
          tar --extract --gzip --file "$archive" gitleaks
      - name: Scan repository history
        run: ./gitleaks git --redact --no-banner

  boot-jdk-matrix:
    name: Boot ${{ matrix.boot }} / JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        boot: [2.6.15, 2.7.18]
        java: [8, 11, 17]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify all production modules and samples
        run: mvn -B -ntp clean verify -Dspring-boot.version=${{ matrix.boot }}
      - name: Verify bytecode and module boundaries
        shell: pwsh
        run: ./scripts/verify-quality-gates.ps1 -SpringBootVersion ${{ matrix.boot }}
