name: compatibility

on:
  push:
  pull_request:

jobs:
  boot-jdk-matrix:
    name: Boot ${{ matrix.boot }} / JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        boot: [2.6.15, 2.7.18]
        java: [8, 11, 17]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify all production modules and samples
        run: mvn -B -ntp clean verify -Dspring-boot.version=${{ matrix.boot }}
      - name: Verify bytecode and module boundaries
        shell: pwsh
        run: ./scripts/verify-quality-gates.ps1
